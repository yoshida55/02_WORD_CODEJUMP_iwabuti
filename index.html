<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Diary</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/work.css" />
  </head>

  <body>
    <!-- ヘッダー【flex 横2列: ロゴ + ナビ】 -->
    <header class="header">
      <!-- └ ロゴ（左） -->
      <img class="header_logo" src="img/logo.svg" alt="My Work" />
      <!-- └ ナビ（右） -->
      <nav class="header_nav">
        <!-- ナビリスト【flex 横5列: About + Works + News + Contact + Instagram】 -->
        <ul class="nav_list">
          <li class="nav_item"><a class="nav_link" href="#">About</a></li>
          <li class="nav_item"><a class="nav_link" href="#">Works</a></li>
          <li class="nav_item"><a class="nav_link" href="#">News</a></li>
          <li class="nav_item"><a class="nav_link" href="#">Contact</a></li>
          <li class="nav_item"
            ><a class="nav_link" href="#"><img class="nav_img" src="img/icon-instagram.png" alt="Instagram" /></a
          ></li>
        </ul>
      </nav>
    </header>

    <!-- メイン【flex 縦3列: メインコンテンツ + メインコンテンツ + メインコンテンツ】 -->
    <main class="main">
      <!-- ===============================================
       メインビジュアル
       ============================================== -->
      <section class="mv">
        <img src="img/mainvisual-pc.jpg" alt="メインビジュアル" />
      </section>

      <section class="about_area">
        <h2 class="about_title">About</h2>
        <p class="about_name"></p>
        <p class="about_info"></p>
        <p class="about_description"></p>
      </section>
      <section class="info"></section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
